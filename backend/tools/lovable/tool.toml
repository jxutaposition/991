id = "lovable"
name = "Lovable"
category = "frontend-hosting"
description = "Cloud-hosted web app builder with AI chat editor. Projects are Vite + React + TypeScript + Supabase. No REST API for project editing — changes are made by generating chat prompts for the user to paste into the Lovable editor."
required_credentials = ["supabase"]
enabled = true

[tradeoffs]
automation = "partial"
api_access = "none"
cost = "free-tier-available"
notes = "No project creation API. No editing API. Changes deploy immediately (no staging). Manual project creation required via lovable.dev UI."
