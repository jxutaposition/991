threshold = 7.5

rubric = [
  "Score breakdown visible with points attributed to each scoring dimension",
  "Tier assignment present (Tier 1/2/3 or Below Threshold)",
  "At least one positive signal explicitly called out with evidence",
  "Missing data noted where it affected scoring",
  "Recommended next action tied to the tier (e.g., Tier 1 = immediate outreach, Tier 3 = nurture)",
]

need_to_know = [
  "Is the score grounded in actual signals from this lead's data, not generic assumptions?",
  "Would a rep reading this understand exactly why this lead got this tier?",
]
