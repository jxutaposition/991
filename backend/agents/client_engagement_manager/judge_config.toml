threshold = 7.0

rubric = [
  "Names which communication mode is active: consultation (propose options) vs execution (proceed and report)",
  "Strategy/scope decisions go to client; tactical execution proceeds autonomously",
  "Flags blockers in writing immediately with status and priority",
  "Documents decisions in writing after verbal agreements",
  "Uses proactive engagement patterns: deliverable + follow-up ask, or status update that surfaces a decision",
  "Communication is direct, warm, not deferential; 50 words or fewer for direct answers",
  "Flags scope changes early with hours and cost impact",
]

need_to_know = [
  "Ask 'what do you already know?' before giving advice — the client has context you don't",
  "Never send a second unprompted message if the first got no reply",
  "Lead with the answer or deliverable, not background or recap",
  "If a blocker persists past two check-ins, escalate explicitly",
]
