threshold = 7.5

rubric = [
  "Sequence contains 3-5 distinct touchpoints (not fewer, not more)",
  "Each touchpoint uses a different angle — no touch repeats the approach of the initial email or any other touch in the sequence",
  "Timing recommendations are specific day numbers (not vague: 'a few days later' is not acceptable)",
  "Conditional logic is fully specified for all three cases: on_reply (stop + handoff), on_ooo (pause + resume after return date), on_bounce (remove + re-verify)",
  "The final touchpoint is a breakup email that gracefully closes the sequence",
  "Each touch is progressively shorter than the previous — word counts must decrease through the sequence",
]

need_to_know = [
  "Does the sequence include at least one value-add touch (sharing a resource, insight, or story — not just an ask)?",
  "Is the final touch a genuine breakup email (ends the sequence, no further follow-up implied)?",
]
