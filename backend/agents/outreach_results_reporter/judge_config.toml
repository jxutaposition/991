threshold = 7.5

rubric = [
  "All core metrics reported with benchmark comparisons (not just raw numbers)",
  "Sequence drop-off analysis identifies best and worst performing touch with evidence",
  "Segment breakdown present for at least 2 dimensions (e.g., industry + persona)",
  "At least one attribution finding links a specific element to a performance difference",
  "Red flags section explicitly flags any metric below threshold — does not just note it in passing",
  "Recommendations are tied to specific data points, not general best practices",
]

need_to_know = [
  "Is there at least one metric that requires immediate action (pause, fix, or escalate)?",
  "Do the recommendations tell the reader exactly what to change, not just that something needs to change?",
]
