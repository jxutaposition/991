name: CI

on:
  pull_request:
    paths: ["frontend/**", "backend/**", ".github/workflows/ci.yml"]
  push:
    branches: [main]
    paths: ["frontend/**", "backend/**", ".github/workflows/ci.yml"]

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx next lint
      - run: npm run build

  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: bash scripts/check-sql-safety.sh
      - run: cargo check
      - run: cargo check --bin migrate
