services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lele_dev
      POSTGRES_USER: lele
      POSTGRES_PASSWORD: lele_dev_password
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
